interface:
  display_name: "Video Report Builder"
  short_description: "Build concise timestamped video reports"
  default_prompt: "Use $youtube-local-transcribe for this video link: derive the real video title, rename the thread to the video topic when possible, respect the configured local/notion/obsidian output environment, prefer captions then local Whisper, write an answer-first summary with timestamped Key Points whose optional one-level nested bullets contain transcript-backed details, examples, numbers, or caveats, parallelizing long transcript drafting when useful, finalize and publish to the configured target when available, then answer with the title, summary, report link or path, key points, and caveats without verbose processing logs."
policy:
  allow_implicit_invocation: true
